<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="GMBIT — every move is a wager">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7ecc6"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#9a7b2e"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a7b2e" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#f4e4bc"/>
      <stop offset="1" stop-color="#9a7b2e" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="vign" cx="0.5" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#1b1712"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .word{ font-family:'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-weight:700; }
      .tag{ font-family:'JetBrains Mono', ui-monospace, 'Courier New', monospace; font-weight:500; }
    </style>
  </defs>

  <!-- backdrop tile -->
  <rect x="0" y="0" width="900" height="320" rx="26" fill="url(#vign)"/>
  <rect x="6" y="6" width="888" height="308" rx="22" fill="none" stroke="#d4af37" stroke-opacity="0.32" stroke-width="1.5"/>

  <!-- crown emblem (vector — renders everywhere, the 'king' brand mark) -->
  <g filter="url(#soft)" transform="translate(450,86)">
    <path d="M -52 22 L -52 -6 L -27 14 L 0 -24 L 27 14 L 52 -6 L 52 22 Z" fill="url(#gold)"/>
    <rect x="-56" y="24" width="112" height="12" rx="3.5" fill="url(#gold)"/>
    <circle cx="-52" cy="-10" r="6"   fill="#f4e4bc"/>
    <circle cx="0"   cy="-31" r="6.5" fill="#f4e4bc"/>
    <circle cx="52"  cy="-10" r="6"   fill="#f4e4bc"/>
    <rect x="-30" y="40" width="60" height="3" rx="1.5" fill="#9a7b2e" opacity="0.7"/>
  </g>

  <!-- wordmark: centered, fixed render width via textLength (robust across fonts/renderers) -->
  <text x="450" y="232" text-anchor="middle" class="word" font-size="138"
        textLength="500" lengthAdjust="spacingAndGlyphs"
        fill="url(#gold)" filter="url(#soft)">GMBIT</text>

  <!-- rule + tagline -->
  <rect x="280" y="258" width="340" height="1.6" fill="url(#goldH)"/>
  <text x="450" y="290" text-anchor="middle" class="tag" font-size="15.5"
        textLength="380" lengthAdjust="spacingAndGlyphs" fill="#cdb464">EVERY MOVE IS A WAGER</text>
</svg>
